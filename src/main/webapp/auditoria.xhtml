<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <f:metadata>
        <f:viewAction
                action="#{loginBean.verificarAccesoAdministrador}"
                onPostback="false"/>
   </f:metadata>

<h:head>

    <title>Auditoría - UTN GolMundial 2026</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0"/>

    <style>

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #f4f6f9;
            color: #1e293b;
        }

        .barra {
            background: #0f172a;
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .marca h1 {
            margin: 0;
            font-size: 24px;
        }

        .marca small {
            color: #cbd5e1;
        }

        .menu {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .sesion-usuario {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-weight: bold;
        }

        .contenedor {
            max-width: 1350px;
            margin: 0 auto;
            padding: 30px 20px;
        }

       .encabezado {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 45%, #2563eb 100%);
            color: white;
            border-radius: 16px;
            padding: 30px 28px;
            margin-bottom: 18px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.22);
            position: relative;
            overflow: hidden;
        }

        .encabezado::after {
            content: "";
            position: absolute;
            width: 230px;
            height: 230px;
            right: -80px;
            top: -95px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
        }

        .encabezado h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            z-index: 1;
        }

        .encabezado p {
            margin: 12px 0 0;
            font-size: 14px;
            color: #dbeafe;
            line-height: 1.5;
            position: relative;
            z-index: 1;
        }

        .acciones{
            background:#fff;
            border-radius:14px;
            padding:16px 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:22px;
            box-shadow:0 4px 15px rgba(0,0,0,.08);
        }

        .detalle {
            white-space: normal;
            word-break: break-word;
        }

    </style>

</h:head>

<h:body>

<div class="barra">

    <div class="marca">
        <h1>UTN GolMundial 2026</h1>
        <small>Panel administrativo del torneo</small>
    </div>

    <h:form id="formMenu">

        <div class="menu">

            <p:button
                    value="Panel"
                    icon="pi pi-home"
                    href="#{request.contextPath}/dashboard.xhtml"
                    styleClass="ui-button-outlined"/>

            <p:button
                    value="Partidos"
                    icon="pi pi-calendar"
                    href="#{request.contextPath}/partidos.xhtml"
                    styleClass="ui-button-outlined"/>

            <p:button
                    value="Selecciones"
                    icon="pi pi-flag"
                    href="#{request.contextPath}/selecciones.xhtml"
                    styleClass="ui-button-outlined"/>

            <p:button
                    value="Sedes"
                    icon="pi pi-map-marker"
                    href="#{request.contextPath}/sedes.xhtml"
                    styleClass="ui-button-outlined"/>

            <p:button
                    value="Usuarios"
                    icon="pi pi-users"
                    href="#{request.contextPath}/usuarios.xhtml"
                    styleClass="ui-button-outlined"/>

            <p:button
                    value="Auditoría"
                    icon="pi pi-search"
                    href="#{request.contextPath}/auditoria.xhtml"/>

            <p:button
                    value="Reportes"
                    icon="pi pi-chart-bar"
                    href="#{request.contextPath}/reportes.xhtml"
                    styleClass="ui-button-outlined"/>

            <h:panelGroup
                    rendered="#{loginBean.logueado and loginBean.administrador}"
                    layout="block"
                    style="display:inline-flex;align-items:center;gap:8px;">

                <span class="sesion-usuario">
                    <i class="pi pi-user"></i>
                    #{loginBean.usuario.nombre}
                </span>

                <p:commandButton
                        value="Cerrar sesión"
                        icon="pi pi-sign-out"
                        action="#{loginBean.cerrarSesion}"
                        ajax="false"
                        styleClass="ui-button-danger"/>

            </h:panelGroup>

        </div>

    </h:form>

</div>

<div class="contenedor">

    <div class="encabezado">

        <div>

            <h1>
                <i class="pi pi-history"></i>
                Auditoría del Sistema
            </h1>

            <p>
                Consulta las acciones administrativas realizadas en el sistema.
            </p>


        </div>

    </div>

    <h:form id="formAuditoria">

        <p:growl
                id="mensajes"
                showDetail="true"/>

        <div class="acciones">

            <p:button
                    value="Volver al panel"
                    icon="pi pi-home"
                    href="#{request.contextPath}/dashboard.xhtml"
                    styleClass="ui-button-secondary"/>

            <p:commandButton
                    value="Actualizar"
                    icon="pi pi-refresh"
                    actionListener="#{auditoriaBean.cargarAuditorias}"
                    process="@this"
                    update=":formAuditoria:tablaAuditoria
                            :formAuditoria:mensajes"/>

        </div>

        <p:dataTable
                id="tablaAuditoria"
                value="#{auditoriaBean.auditorias}"
                var="a"

                paginator="true"
                rows="10"

                reflow="true"

                rowsPerPageTemplate="10,20,50"

                emptyMessage="No existen registros de auditoría.">

            <p:column
                    headerText="ID"
                    style="width:60px">

                #{a.id}

            </p:column>

            <p:column
                    headerText="Acción">

                <h:outputText
                    value="#{a.accion == 'CREAR_USUARIO'
                    ? 'Crear usuario'
                    : a.accion == 'CAMBIAR_ROL_USUARIO'
                    ? 'Cambiar rol'
                    : a.accion == 'ACTIVAR_USUARIO'
                    ? 'Activar usuario'
                    : a.accion == 'DESACTIVAR_USUARIO'
                    ? 'Desactivar usuario'
                    : a.accion == 'RESTABLECER_PASSWORD'
                    ? 'Restablecer contraseña'
                    : a.accion == 'REGISTRO_USUARIO'
                    ? 'Registro de usuario'
                    : a.accion}"/>

            </p:column>

            <p:column
                    headerText="Entidad">

                #{a.entidad}

            </p:column>
                        <p:column
                    headerText="ID Entidad"
                    style="width:90px">

                #{a.entidadId}

            </p:column>

            <p:column
                    headerText="Usuario">

                #{a.usuarioReferencia}

            </p:column>

            <p:column
                    headerText="Detalle">

                <h:outputText
                        value="#{a.detalle}"
                        styleClass="detalle"/>

            </p:column>

            <p:column
                    headerText="Fecha y hora">

                #{a.fechaHoraUtc}

            </p:column>

        </p:dataTable>

    </h:form>

</div>

</h:body>

</html>
