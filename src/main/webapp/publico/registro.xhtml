<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<h:head>

    <title>Registro - UTN GolMundial 2026</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0"/>

    <style>

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            background:
                    linear-gradient(
                            135deg,
                            #0f172a,
                            #1d4ed8
                    );
            color: #1e293b;
        }

        .barra {
            background-color: #0f172a;
            color: white;
            padding: 16px 24px;

            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .marca h1 {
            margin: 0;
            font-size: 24px;
        }

        .marca small {
            color: #cbd5e1;
        }

        .menu {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .contenido {
            min-height: calc(100vh - 90px);

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 35px 18px;
        }

        .tarjeta-registro {
            width: 100%;
            max-width: 520px;

            background-color: white;
            border-radius: 14px;
            padding: 30px;

            box-shadow:
                    0 14px 35px rgba(15, 23, 42, 0.28);
        }

        .cabecera {
            text-align: center;
            margin-bottom: 24px;
        }

        .cabecera i {
            font-size: 48px;
            color: #2563eb;
        }

        .cabecera h2 {
            margin: 12px 0 6px;
            font-size: 28px;
        }

        .cabecera p {
            margin: 0;
            color: #64748b;
        }

        .campo {
            margin-bottom: 17px;
        }

        .campo label {
            display: block;
            margin-bottom: 7px;
            font-weight: bold;
            color: #334155;
        }

        .acciones {
            margin-top: 22px;
        }

        .acciones .ui-button {
            width: 100%;
        }

        .enlace-login {
            margin-top: 20px;
            text-align: center;
            color: #64748b;
        }

        .enlace-login a {
            color: #2563eb;
            font-weight: bold;
            text-decoration: none;
        }

        .nota {
            margin-top: 18px;
            padding: 12px;
            border-radius: 8px;
            background-color: #eff6ff;
            color: #1e40af;
            font-size: 14px;
        }

        @media (max-width: 600px) {

            .tarjeta-registro {
                padding: 22px;
            }

            .menu {
                width: 100%;
            }
        }

    </style>

</h:head>

<h:body>

    <div class="barra">

        <div class="marca">

            <h1>UTN GolMundial 2026</h1>

            <small>
                Portal público del torneo
            </small>

        </div>

        <div class="menu">

            <p:button
                    value="Inicio"
                    icon="pi pi-home"
                    href="inicio.xhtml"
                    styleClass="ui-button-outlined"/>

            <p:button
                    value="Partidos"
                    icon="pi pi-calendar"
                    href="partidos.xhtml"
                    styleClass="ui-button-outlined"/>

            <p:button
                    value="Ingresar"
                    icon="pi pi-sign-in"
                    href="login.xhtml"
                    styleClass="ui-button-success"/>

        </div>

    </div>

    <main class="contenido">

        <section class="tarjeta-registro">

            <div class="cabecera">

                <i class="pi pi-user-plus"></i>

                <h2>Crear una cuenta</h2>

                <p>
                    Regístrate para acceder a las funciones
                    disponibles para usuarios del sistema.
                </p>

            </div>

            <h:form id="formRegistro">

                <p:messages
                        id="mensajes"
                        showDetail="true"
                        closable="true"/>

                <div class="campo">

                    <p:outputLabel
                            for="username"
                            value="Nombre de usuario:"/>

                    <p:inputText
                            id="username"
                            value="#{registroPublicoBean.username}"
                            required="true"
                            requiredMessage="El usuario es obligatorio."
                            minlength="4"
                            maxlength="60"
                            placeholder="Ejemplo: belen2026"
                            style="width: 100%;"/>

                </div>

                <div class="campo">

                    <p:outputLabel
                            for="nombre"
                            value="Nombre completo:"/>

                    <p:inputText
                            id="nombre"
                            value="#{registroPublicoBean.nombre}"
                            required="true"
                            requiredMessage="El nombre es obligatorio."
                            maxlength="150"
                            placeholder="Ingrese su nombre completo"
                            style="width: 100%;"/>

                </div>

                <div class="campo">

                    <p:outputLabel
                            for="password"
                            value="Contraseña:"/>

                    <p:password
                            id="password"
                            value="#{registroPublicoBean.password}"
                            required="true"
                            requiredMessage="La contraseña es obligatoria."
                            minlength="8"
                            maxlength="128"
                            feedback="true"
                            toggleMask="true"
                            redisplay="true"
                            placeholder="Mínimo 8 caracteres"
                            style="width: 100%;"/>

                </div>

                <div class="campo">

                    <p:outputLabel
                            for="confirmarPassword"
                            value="Confirmar contraseña:"/>

                    <p:password
                            id="confirmarPassword"
                            value="#{registroPublicoBean.confirmarPassword}"
                            required="true"
                            requiredMessage="Confirme la contraseña."
                            minlength="8"
                            maxlength="128"
                            toggleMask="true"
                            redisplay="true"
                            placeholder="Repita la contraseña"
                            style="width: 100%;"/>

                </div>

                <div class="nota">

                    <i class="pi pi-info-circle"></i>

                    Las cuentas registradas públicamente
                    reciben automáticamente el rol de usuario.

                </div>

                <div class="acciones">

                    <p:commandButton
                            value="Crear cuenta"
                            icon="pi pi-check"
                            action="#{registroPublicoBean.registrar}"
                            process="@form"
                            update="@form"
                            ajax="false"
                            styleClass="ui-button-success"/>

                </div>

                <div class="enlace-login">

                    <span>¿Ya tienes una cuenta? </span>

                    <h:link
                            value="Iniciar sesión"
                            outcome="/publico/login.xhtml"/>

                </div>

            </h:form>

        </section>

    </main>

</h:body>

</html>
